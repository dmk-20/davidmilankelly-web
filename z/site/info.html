<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Info — david milan kelly</title>
  <style>
    :root {
      --bg: #fff;
      --text: #0a0a0a;
      --muted: #444;
      --pad: clamp(24px, 6vw, 80px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: var(--pad);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }

    .header a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header .name { font-weight: 400; letter-spacing: 0.2em; }

    .header nav { display: flex; gap: 2.5rem; }

    main {
      padding: var(--pad);
      padding-top: calc(60px + var(--pad));
      max-width: 520px;
    }

    main p {
      font-size: 0.9rem;
      line-height: 1.7;
      letter-spacing: 0.01em;
      color: var(--muted);
    }

    main a {
      color: var(--text);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="name">david milan kelly</a>
    <nav>
      <a href="index.html">Film</a>
      <a href="info.html">Info</a>
    </nav>
  </header>

  <main>
    <p>Writer &amp; director. For enquiries: <a href="mailto:hello@davidmilankelly.com">hello@davidmilankelly.com</a></p>
  </main>
</body>
</html>
