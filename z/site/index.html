  <style>
    :root {
      --bg: #fff;
      --text: #0a0a0a;
      --muted: #444;
      --pad: clamp(24px, 6vw, 80px);
      --gap: clamp(12px, 2vw, 32px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Name-only header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: var(--pad);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }

    .header a {
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header .name {
      font-weight: 400;
      letter-spacing: 0.2em;
    }

    .header nav {
      display: flex;
      gap: 2.5rem;
    }

    .header nav a {
      font-weight: 300;
    }

    main {
      padding: var(--pad);
      padding-top: calc(60px + var(--pad));
      width: 100%;
    }

    /* Editorial grid: full-bleed feel, generous space */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      width: 100%;
      max-width: 100%;
    }

    .grid-item {
      display: block;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .grid-item .media {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #0a0a0a;
    }

    .grid-item .media img,
    .grid-item .media video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .grid-item .title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 0 0;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .grid-item:hover .title {
      opacity: 1;
    }

    /* Full-screen playback overlay */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #000;
      align-items: center;
      justify-content: center;
    }

    #overlay.open {
      display: flex;
    }

    #overlay .inner {
      position: relative;
      width: 100%;
      max-width: 1400px;
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 80px);
    }

    #overlay .preview {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #000;
      transition: opacity 0.4s ease;
    }

    #overlay .preview.fade {
      opacity: 0;
      pointer-events: none;
    }

    #overlay .preview img,
    #overlay .preview video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    #overlay iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 0;
    }

    #overlay .close {
      position: absolute;
      top: -52px;
      right: 0;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 300;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    #overlay .close:hover {
      opacity: 0.7;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>

  <div id="overlay" aria-hidden="true">
    <div class="inner">
      <button type="button" class="close" aria-label="Close">&times;</button>
      <div id="preview" class="preview"></div>
      <div id="embed"></div>
    </div>
  </div>

  <script>
    (function() {
      var overlay = document.getElementById('overlay');
      var embedEl = document.getElementById('embed');
      var previewEl = document.getElementById('preview');
      var closeBtn = overlay && overlay.querySelector('.close');

      function closeOverlay() {
        if (!overlay) return;
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
        embedEl.innerHTML = '';
        if (previewEl) {
          previewEl.innerHTML = '';
          previewEl.classList.remove('fade');
        }
      }

      function openOverlay(type, id) {
        if (!overlay || !embedEl) return;

        if (previewEl) {
          previewEl.innerHTML = '';
          previewEl.classList.remove('fade');
          if (type === 'youtube') {
            var img = document.createElement('img');
            img.alt = '';
            img.src = 'https://img.youtube.com/vi/' + id + '/maxresdefault.jpg';
            img.onerror = function() {
              this.onerror = null;
              this.src = 'https://img.youtube.com/vi/' + id + '/hqdefault.jpg';
            };
            previewEl.appendChild(img);
          } else if (type === 'vimeo') {
            fetch('https://vimeo.com/api/oembed.json?url=https://vimeo.com/' + id + '&width=1920&height=1080')
              .then(function(r) { return r.json(); })
              .then(function(data) {
                if (previewEl && data.thumbnail_url && overlay.classList.contains('open')) {
                  var vimg = document.createElement('img');
                  vimg.alt = '';
                  vimg.src = data.thumbnail_url;
                  previewEl.innerHTML = '';
                  previewEl.appendChild(vimg);
                }
              })
              .catch(function() {});
          }
        }

        embedEl.innerHTML = '';
        var src = type === 'youtube'
          ? 'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0'
          : 'https://player.vimeo.com/video/' + id + '?autoplay=1';
        var iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        iframe.allowFullscreen = true;
        embedEl.appendChild(iframe);
        iframe.addEventListener('load', function() {
          setTimeout(function() {
            if (previewEl && overlay.classList.contains('open')) previewEl.classList.add('fade');
          }, 400);
        });
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
      }

      document.querySelectorAll('.grid-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          var type = item.getAttribute('data-video-type');
          var id = item.getAttribute('data-video-id');
          if (type && id) {
            e.preventDefault();
            openOverlay(type, id);
          }
        });
      });

      if (closeBtn) closeBtn.addEventListener('click', closeOverlay);
      if (overlay) overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeOverlay();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay && overlay.classList.contains('open')) closeOverlay();
      });
    })();
  </script>
