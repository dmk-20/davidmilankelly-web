<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flip the coin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: system-ui, sans-serif;
      color: #eee;
    }

    .coin-wrap {
      perspective: 1200px;
      cursor: pointer;
      user-select: none;
    }

    .coin {
      width: 140px;
      height: 140px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    .coin.flipping {
      transition: none;
      animation: flip 0.6s ease-in-out forwards;
    }

    @keyframes flip {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(calc(var(--rotations) * 360deg + var(--final-deg))); }
    }

    .coin-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 800;
      color: #1a1a1a;
      border: 6px solid #c9a227;
      background: linear-gradient(145deg, #e8d48b, #c9a227);
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.4), inset 0 -2px 6px rgba(0,0,0,0.2);
    }

    .coin-face.heads {
      transform: rotateY(0deg);
    }

    .coin-face.tails {
      transform: rotateY(180deg);
    }

    .result {
      margin-top: 1.5rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: #c9a227;
      min-height: 1.5em;
    }

    .hint {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="coin-wrap" id="coinWrap" role="button" tabindex="0" aria-label="Click to flip coin">
    <div class="coin" id="coin">
      <div class="coin-face heads">H</div>
      <div class="coin-face tails">T</div>
    </div>
  </div>
  <div class="result" id="result"></div>
  <div class="hint">Click to flip</div>

  <script>
    const coin = document.getElementById('coin');
    const coinWrap = document.getElementById('coinWrap');
    const resultEl = document.getElementById('result');

    let isFlipping = false;

    function flipCoin() {
      if (isFlipping) return;
      isFlipping = true;
      resultEl.textContent = '';

      const outcome = Math.random() < 0.5 ? 'heads' : 'tails';
      const finalDeg = outcome === 'heads' ? 0 : 180;
      const rotations = 4 + Math.floor(Math.random() * 3);

      coin.style.setProperty('--final-deg', finalDeg + 'deg');
      coin.style.setProperty('--rotations', rotations);
      coin.classList.remove('flipping');
      coin.offsetHeight;
      coin.classList.add('flipping');

      setTimeout(() => {
        coin.classList.remove('flipping');
        coin.style.transform = `rotateY(${finalDeg}deg)`;
        resultEl.textContent = outcome === 'heads' ? 'Heads' : 'Tails';
        isFlipping = false;
      }, 600);
    }

    coinWrap.addEventListener('click', flipCoin);
    coinWrap.addEventListener('keydown', (e) => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCoin(); } });
  </script>
</body>
</html>
